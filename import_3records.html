<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>修复导入 - 压缩图片</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
    button { padding: 15px 30px; font-size: 16px; cursor: pointer; background: #f97316; color: white; border: none; border-radius: 5px; }
    button:disabled { background: #ccc; }
    .log { margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 5px; max-height: 500px; overflow-y: auto; font-size: 14px; }
    .success { color: green; }
    .error { color: red; }
    .info { color: blue; }
    .progress { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h1>修复导入 - 压缩过大图片</h1>
  <p>将自动压缩超过 500KB 的图片，然后重新导入失败的 3 条记录。</p>
  <button id="startBtn" onclick="startImport()">开始修复导入</button>
  <div id="progress" class="progress"></div>
  <div id="log" class="log"></div>

  <script>
    const API_URL = 'https://cuotiben-api.roy020218.workers.dev/api/records';
    const LOG_FILE = 'exported_data.json';
    const MAX_SIZE = 500 * 1024; // 500KB

    function log(msg, type = '') {
      const div = document.getElementById('log');
      const p = document.createElement('p');
      p.textContent = new Date().toLocaleTimeString() + ': ' + msg;
      if (type) p.className = type;
      div.appendChild(p);
      div.scrollTop = div.scrollHeight;
    }

    function setProgress(msg) {
      document.getElementById('progress').textContent = msg;
    }

    async function compressImage(base64Data) {
      // 解析图片格式
      const match = base64Data.match(/^data:image\/(\w+);base64,(.+)$/);
      if (!match) return base64Data;

      const type = match[1];
      const data = match[2];

      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;

          // 检查是否需要压缩
          const originalSize = (data.length * 3) / 4;
          if (originalSize <= MAX_SIZE) {
            resolve(base64Data);
            return;
          }

          // 计算压缩比例
          const ratio = Math.sqrt(MAX_SIZE / originalSize);
          width = Math.floor(width * ratio);
          height = Math.floor(height * ratio);

          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);

          // 压缩为 JPEG，质量 0.7
          const compressed = canvas.toDataURL('image/jpeg', 0.7);
          resolve(compressed);
        };
        img.src = base64Data;
      });
    }

    async function startImport() {
      const btn = document.getElementById('startBtn');
      btn.disabled = true;
      log('开始处理...');

      try {
        // 读取本地 JSON 文件
        const response = await fetch(LOG_FILE);
        if (!response.ok) throw new Error('无法读取 exported_data.json');
        const content = await response.text();
        const jsonStr = content.replace(/^【[^】]*】/, '');
        const records = JSON.parse(jsonStr);

        // 找到失败的3条记录
        const failedIds = ['mnkbd9wsfkch', 'mnkfbmh3ecmu', 'mnkh39v2avtc'];
        const failedRecords = records.filter(r => failedIds.includes(r.id));

        log(`找到 ${failedRecords.length} 条需要修复的记录`);

        let success = 0;
        let fail = 0;

        for (let i = 0; i < failedRecords.length; i++) {
          const record = failedRecords[i];
          setProgress(`处理第 ${i + 1}/${failedRecords.length} 条: ${record.id}`);

          log(`\n处理记录: ${record.id}`);

          // 检查并压缩图片
          if (record.images && record.images.length > 0) {
            log(`原图片数量: ${record.images.length}`);
            const originalSize = record.images.reduce((sum, img) => sum + img.length, 0);
            log(`原总大小: ${(originalSize / 1024).toFixed(1)} KB`);

            const compressedImages = [];
            for (let j = 0; j < record.images.length; j++) {
              const compressed = await compressImage(record.images[j]);
              compressedImages.push(compressed);
              if (compressed !== record.images[j]) {
                log(`  图片 ${j + 1} 已压缩`);
              }
            }
            record.images = compressedImages;

            const newSize = record.images.reduce((sum, img) => sum + img.length, 0);
            log(`压缩后大小: ${(newSize / 1024).toFixed(1)} KB`);
          }

          // 导入
          try {
            const payload = {
              id: record.id,
              data: JSON.stringify(record)
            };

            const res = await fetch(API_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });

            if (res.ok) {
              log(`✓ 导入成功: ${record.id}`, 'success');
              success++;
            } else {
              const err = await res.text();
              log(`✗ 导入失败: ${record.id} - ${err}`, 'error');
              fail++;
            }
          } catch (e) {
            log(`✗ 错误: ${record.id} - ${e.message}`, 'error');
            fail++;
          }

          // 等待一下
          await new Promise(r => setTimeout(r, 500));
        }

        setProgress('');
        log(`\n修复完成！成功: ${success}, 失败: ${fail}`, success > 0 ? 'success' : 'error');
      } catch (e) {
        log('错误: ' + e.message, 'error');
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
